<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Beauty Platform - Онлайн-запись</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#007AFF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Beauty">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <!-- SEO -->
  <meta name="description" content="Онлайн-запись на услуги красоты. Выберите услугу, дату и время.">

  <!-- PWA: редирект на мастера ДО загрузки любых скриптов и SW -->
  <script>
    (function() {
      try {
        var params = new URLSearchParams(window.location.search);
        // Уже есть ?master= или ?page= — ничего не делаем
        if (params.get('master') || params.get('page')) return;

        // 1. Ищем slug в localStorage
        var saved = localStorage.getItem('current_master_slug');
        if (saved) {
          location.replace('/?master=' + saved);
          return;
        }

        // 2. Ищем slug в beauty_auth
        var auth = localStorage.getItem('beauty_auth');
        if (auth) {
          try {
            var a = JSON.parse(auth);
            if (a && a.user && a.user.slug) {
              localStorage.setItem('current_master_slug', a.user.slug);
              location.replace('/?master=' + a.user.slug);
              return;
            }
          } catch (e) {}
        }

        // 3. Для iOS PWA (standalone) — если localStorage пуст,
        //    пробуем взять slug из cookie (кросс-контекстный)
        var isPwa = window.navigator.standalone === true ||
                    window.matchMedia('(display-mode: standalone)').matches;
        if (isPwa) {
          var match = document.cookie.match(/beauty_master=([^;]+)/);
          if (match) {
            var slug = decodeURIComponent(match[1]);
            localStorage.setItem('current_master_slug', slug);
            location.replace('/?master=' + slug);
            return;
          }
        }
      } catch (e) {}
    })();
  </script>

  <!-- Telegram Web App SDK (только внутри Telegram) -->
  <script>
    if (window.TelegramWebviewProxy || location.hash.includes('tgWebAppData') || navigator.userAgent.includes('TelegramBot')) {
      var s = document.createElement('script');
      s.src = 'https://telegram.org/js/telegram-web-app.js';
      document.head.appendChild(s);
    }
  </script>

  <!-- Стили -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Контейнер приложения — экраны рендерятся динамически -->
  <div id="app"></div>

  <!-- Настройки подключения -->
  <script src="config.js"></script>

  <!-- Авторизация по телефону (веб-версия) -->
  <script src="auth.js"></script>

  <!-- API — загрузка данных из базы -->
  <script src="supabase-api.js"></script>

  <!-- Локальные данные (fallback, если база недоступна) -->
  <script src="data.js"></script>

  <!-- Логика приложения (роутер, экраны, обработчики) -->
  <script src="app.js"></script>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>

</body>
</html>
