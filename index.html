<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Beauty Platform - Онлайн-запись</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#007AFF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Beauty">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <!-- SEO -->
  <meta name="description" content="Онлайн-запись на услуги красоты. Выберите услугу, дату и время.">

  <!-- Telegram Web App SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Стили -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Контейнер приложения — экраны рендерятся динамически -->
  <div id="app"></div>

  <!-- Настройки подключения -->
  <script src="config.js"></script>

  <!-- API — загрузка данных из базы -->
  <script src="supabase-api.js"></script>

  <!-- Локальные данные (fallback, если база недоступна) -->
  <script src="data.js"></script>

  <!-- Логика приложения (роутер, экраны, обработчики) -->
  <script src="app.js"></script>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>

</body>
</html>
